# Local dev infrastructure: Postgres + Redis.
# Run: docker compose up -d
# Stop: docker compose down
# Reset: docker compose down -v  (WARNING: wipes data)

services:
  postgres:
    image: postgres:16-alpine
    container_name: trendradar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trendradar
      POSTGRES_PASSWORD: trendradar
      POSTGRES_DB: trendradar
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trendradar"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trendradar-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg_data:
  redis_data:
